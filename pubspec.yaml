name: seeku
description: "SeekU: a Windows-first CQU schedule assistant built with Flutter."
publish_to: 'none'

version: 0.1.0-alpha+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.28.0
  file_picker: ^10.3.3
  flutter_riverpod: ^3.0.0
  go_router: ^16.2.5
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqlite3_flutter_libs: ^0.5.39

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: sqlite3

