name: seeku
description: "SeekU: a Windows-first CQU schedule assistant built with Flutter."
publish_to: 'none'

version: 0.1.0-rc.1+5

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.28.0
  excel: ^4.0.6
  file_picker: ^10.3.3
  flutter_riverpod: ^3.0.0
  flutter_markdown: ^0.7.7+1
  go_router: ^16.2.5
  path: ^1.9.1
  path_provider: ^2.1.5
  pointycastle: ^4.0.0
  shared_preferences: ^2.5.3
  sqlite3_flutter_libs: ^0.5.39
  tray_manager: ^0.5.0
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - flutter_logo_icon_pack/master_logo_1024.png
    - windows/runner/resources/app_icon.ico
    - docs/ABOUT.md
    - docs/CONTACT.md
    - docs/User_Agreement.md
    - LICENSE

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3



